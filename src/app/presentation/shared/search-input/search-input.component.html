<div class="search-input-wrapper d-flex align-items-center flex-grow-1" [ngClass]="customClass">
  <span class="icon-svg icon-search search-icon-prefix text-muted flex-shrink-0"
    style="width: 18px; height: 18px; opacity: 0.5;"></span>
  <input type="text" [formControl]="control" [placeholder]="placeholder"
    class="search-input-control border-0 ms-2" [style.width]="inputWidth"
    style="outline: none; flex: 1; min-width: 0; font-size: 0.82rem;" />
</div>
