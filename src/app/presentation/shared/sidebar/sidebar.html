<nav class="sidebar-nav">

    </div>
  </div>

        <span class="icon-svg icon-nodos nav-icon" [class.me-3]="!isCollapsed()"

        <span [class.d-none]="isCollapsed()">Nodos</span>
      </a>
    </li>
    <li class="nav-item mb-2">
      <a routerLink="/dashboard/metadatos" routerLinkActive="active"

        <div class="active-indicator"></div>
        <span class="icon-svg icon-metadatos nav-icon" [class.me-3]="!isCollapsed()"
          style="width: 18px; height: 18px;"></span>
        <span [class.d-none]="isCollapsed()">Metadatos</span>
      </a>
    </li>

      <a routerLink="/dashboard/roles" routerLinkActive="active"

        <span [class.d-none]="isCollapsed()">Roles</span>

        <span class="icon-svg icon-usuarios nav-icon" [class.me-3]="!isCollapsed()"
          style="width: 18px; height: 18px;"></span>
        <span [class.d-none]="isCollapsed()">Usuarios</span>
      </a>
    </li>
    }
